<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">

  <!-- Background -->
  <rect width="700" height="400" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="350" y="44" text-anchor="middle" fill="#f0f0f0" font-size="17" font-weight="700">Cost vs. Coverage</text>
  <text x="350" y="66" text-anchor="middle" fill="#8b8fa8" font-size="12">What you pay · What you get</text>

  <!-- ── LEFT CARD: Manual QA ── -->
  <rect x="60" y="88" width="255" height="262" fill="#15171f" rx="10" stroke="#ef4444" stroke-width="1.2"/>

  <!-- Card header -->
  <rect x="60" y="88" width="255" height="44" fill="#1e0a0a" rx="10"/>
  <rect x="60" y="112" width="255" height="20" fill="#1e0a0a"/>
  <text x="187" y="116" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="700">Manual QA</text>

  <!-- Cost -->
  <text x="187" y="162" text-anchor="middle" fill="#ef4444" font-size="42" font-weight="800">$400</text>
  <text x="187" y="184" text-anchor="middle" fill="#5a5f7a" font-size="11">/month (avg)</text>

  <!-- Divider -->
  <line x1="90" y1="200" x2="285" y2="200" stroke="#2a2d3e" stroke-width="1"/>

  <!-- Stats -->
  <text x="90" y="224" fill="#8b8fa8" font-size="12">Tickets reviewed</text>
  <text x="285" y="224" text-anchor="end" fill="#ef4444" font-size="13" font-weight="700">200</text>

  <text x="90" y="250" fill="#8b8fa8" font-size="12">Coverage</text>
  <text x="285" y="250" text-anchor="end" fill="#ef4444" font-size="13" font-weight="700">2%</text>

  <text x="90" y="276" fill="#8b8fa8" font-size="12">Cost per ticket</text>
  <text x="285" y="276" text-anchor="end" fill="#ef4444" font-size="13" font-weight="700">~$2.00</text>

  <text x="90" y="302" fill="#8b8fa8" font-size="12">Feedback latency</text>
  <text x="285" y="302" text-anchor="end" fill="#ef4444" font-size="13" font-weight="700">Days</text>

  <text x="90" y="328" fill="#8b8fa8" font-size="12">Blind spot</text>
  <text x="285" y="328" text-anchor="end" fill="#ef4444" font-size="13" font-weight="700">9,800 tickets</text>

  <!-- ── RIGHT CARD: Cortex-QA ── -->
  <rect x="385" y="88" width="255" height="262" fill="#0b1a12" rx="10" stroke="#4ade80" stroke-width="1.5"/>

  <!-- Glow border effect -->
  <rect x="385" y="88" width="255" height="262" fill="none" rx="10" stroke="#4ade80" stroke-width="6" opacity="0.08"/>

  <!-- Card header -->
  <rect x="385" y="88" width="255" height="44" fill="#0d2218" rx="10"/>
  <rect x="385" y="112" width="255" height="20" fill="#0d2218"/>
  <text x="512" y="116" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="700">Cortex-QA</text>

  <!-- Cost -->
  <text x="512" y="162" text-anchor="middle" fill="#4ade80" font-size="42" font-weight="800">$20</text>
  <text x="512" y="184" text-anchor="middle" fill="#5a5f7a" font-size="11">/month (API cost)</text>

  <!-- Divider -->
  <line x1="415" y1="200" x2="610" y2="200" stroke="#1a3020" stroke-width="1"/>

  <!-- Stats -->
  <text x="415" y="224" fill="#8b8fa8" font-size="12">Tickets reviewed</text>
  <text x="610" y="224" text-anchor="end" fill="#4ade80" font-size="13" font-weight="700">10,000</text>

  <text x="415" y="250" fill="#8b8fa8" font-size="12">Coverage</text>
  <text x="610" y="250" text-anchor="end" fill="#4ade80" font-size="13" font-weight="700">100%</text>

  <text x="415" y="276" fill="#8b8fa8" font-size="12">Cost per ticket</text>
  <text x="610" y="276" text-anchor="end" fill="#4ade80" font-size="13" font-weight="700">~$0.002</text>

  <text x="415" y="302" fill="#8b8fa8" font-size="12">Feedback latency</text>
  <text x="610" y="302" text-anchor="end" fill="#4ade80" font-size="13" font-weight="700">Real-time</text>

  <text x="415" y="328" fill="#8b8fa8" font-size="12">Blind spot</text>
  <text x="610" y="328" text-anchor="end" fill="#4ade80" font-size="13" font-weight="700">0 tickets</text>

  <!-- VS divider in the middle -->
  <circle cx="350" cy="219" r="22" fill="#1a1d2e" stroke="#2a2d3e" stroke-width="1.5"/>
  <text x="350" y="225" text-anchor="middle" fill="#6366f1" font-size="13" font-weight="800">VS</text>

  <!-- Footer caption -->
  <text x="350" y="396" text-anchor="middle" fill="#3d4166" font-size="10">DGPC · Cortex-QA · dgpconsult.com</text>
</svg>
