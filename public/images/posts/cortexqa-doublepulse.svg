<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">

  <!-- Background -->
  <rect width="700" height="420" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="350" y="40" text-anchor="middle" fill="#f0f0f0" font-size="17" font-weight="700">The Double-Pulse Architecture</text>
  <text x="350" y="60" text-anchor="middle" fill="#8b8fa8" font-size="12">Separating reasoning from scoring — per ticket, every ticket</text>

  <!-- ── STEP 0: INPUT ── -->
  <rect x="30" y="88" width="120" height="60" rx="8" fill="#15171f" stroke="#2a2d3e" stroke-width="1.2"/>
  <text x="90" y="111" text-anchor="middle" fill="#8b8fa8" font-size="10" font-weight="600">INPUT</text>
  <text x="90" y="127" text-anchor="middle" fill="#f0f0f0" font-size="12" font-weight="700">Ticket</text>
  <text x="90" y="141" text-anchor="middle" fill="#5a5f7a" font-size="9">customer + agent thread</text>

  <!-- Arrow 0→1 -->
  <line x1="152" y1="118" x2="188" y2="118" stroke="#2a2d3e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── STEP 1: INTEGRITY GATE ── -->
  <rect x="190" y="88" width="130" height="60" rx="8" fill="#15171f" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="255" y="109" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="700">INTEGRITY GATE</text>
  <text x="255" y="125" text-anchor="middle" fill="#f0f0f0" font-size="11">7-Stage Filter</text>
  <text x="255" y="140" text-anchor="middle" fill="#5a5f7a" font-size="9">brand · language · length</text>

  <!-- Rejected branch (downward) -->
  <line x1="255" y1="148" x2="255" y2="175" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="255" y="189" text-anchor="middle" fill="#ef4444" font-size="9">rejected</text>

  <!-- Arrow 1→2 -->
  <line x1="322" y1="118" x2="358" y2="118" stroke="#2a2d3e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── STEP 2: PULSE 1 ── -->
  <rect x="360" y="78" width="140" height="80" rx="8" fill="#0d1a2e" stroke="#6366f1" stroke-width="1.5"/>
  <!-- Header pill -->
  <rect x="378" y="85" width="104" height="18" rx="9" fill="#6366f1"/>
  <text x="430" y="98" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">PULSE 1</text>
  <text x="430" y="116" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="600">Qualitative</text>
  <text x="430" y="130" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="600">Reasoning</text>
  <text x="430" y="148" text-anchor="middle" fill="#4a4f7a" font-size="9">≤40-word narrative</text>

  <!-- Arrow 2→3 -->
  <line x1="502" y1="118" x2="538" y2="118" stroke="#2a2d3e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── STEP 3: PULSE 2 ── -->
  <rect x="540" y="78" width="140" height="80" rx="8" fill="#0b1a12" stroke="#4ade80" stroke-width="1.5"/>
  <!-- Header pill -->
  <rect x="558" y="85" width="104" height="18" rx="9" fill="#16a34a"/>
  <text x="610" y="98" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">PULSE 2</text>
  <text x="610" y="116" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">Structured</text>
  <text x="610" y="130" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">Scoring</text>
  <text x="610" y="148" text-anchor="middle" fill="#2d5a3a" font-size="9">JSON output</text>

  <!-- ── Output Box (below Pulse 2) ── -->
  <line x1="610" y1="160" x2="610" y2="195" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrGreen)"/>

  <rect x="540" y="197" width="140" height="78" rx="8" fill="#0a130f" stroke="#2d5a3a" stroke-width="1"/>
  <text x="610" y="215" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="700">AUDIT RECORD</text>
  <text x="610" y="232" text-anchor="middle" fill="#5a5f7a" font-size="9">empatia: 4</text>
  <text x="610" y="246" text-anchor="middle" fill="#5a5f7a" font-size="9">resolucion: 1</text>
  <text x="610" y="260" text-anchor="middle" fill="#5a5f7a" font-size="9">cumplimiento: 1</text>
  <text x="610" y="268" text-anchor="middle" fill="#1a3020" font-size="1"> </text>

  <!-- Feedback arrow from P1 narrative into P2 -->
  <path d="M 430 158 Q 430 175 520 175 Q 540 175 540 158" fill="none" stroke="#6366f1" stroke-width="1" stroke-dasharray="4 2" opacity="0.6"/>
  <text x="484" y="172" text-anchor="middle" fill="#6366f1" font-size="8" opacity="0.8">grounded context</text>

  <!-- ── WHY BOX ── -->
  <rect x="30" y="200" width="300" height="190" rx="10" fill="#13141c" stroke="#1e2130" stroke-width="1"/>
  <text x="180" y="225" text-anchor="middle" fill="#f0f0f0" font-size="13" font-weight="700">Why Two Pulses?</text>

  <!-- Row 1 -->
  <circle cx="55" cy="257" r="12" fill="#6366f1" opacity="0.15"/>
  <text x="55" y="261" text-anchor="middle" fill="#6366f1" font-size="13">①</text>
  <text x="75" y="254" fill="#8b8fa8" font-size="11" font-weight="600">Single-prompt scoring</text>
  <text x="75" y="268" fill="#5a5f7a" font-size="10">hallucinates under constraint</text>

  <!-- Row 2 -->
  <circle cx="55" cy="300" r="12" fill="#4ade80" opacity="0.1"/>
  <text x="55" y="304" text-anchor="middle" fill="#4ade80" font-size="13">②</text>
  <text x="75" y="297" fill="#8b8fa8" font-size="11" font-weight="600">Reasoning first</text>
  <text x="75" y="311" fill="#5a5f7a" font-size="10">mirrors human QA cognition</text>

  <!-- Row 3 -->
  <circle cx="55" cy="343" r="12" fill="#f59e0b" opacity="0.1"/>
  <text x="55" y="347" text-anchor="middle" fill="#f59e0b" font-size="13">③</text>
  <text x="75" y="340" fill="#8b8fa8" font-size="11" font-weight="600">Scores grounded in</text>
  <text x="75" y="354" fill="#5a5f7a" font-size="10">the model's own narrative</text>

  <!-- Row 4 -->
  <circle cx="55" cy="375" r="12" fill="#ef4444" opacity="0.08"/>
  <text x="55" y="379" text-anchor="middle" fill="#ef4444" font-size="13">④</text>
  <text x="75" y="372" fill="#8b8fa8" font-size="11" font-weight="600">Audit trail built-in</text>
  <text x="75" y="386" fill="#5a5f7a" font-size="10">analysis + JSON both logged</text>

  <!-- ── SCALE badge ── -->
  <rect x="358" y="197" width="163" height="78" rx="8" fill="#13141c" stroke="#1e2130" stroke-width="1"/>
  <text x="440" y="220" text-anchor="middle" fill="#f0f0f0" font-size="12" font-weight="700">At Scale</text>
  <text x="440" y="244" text-anchor="middle" fill="#6366f1" font-size="22" font-weight="800">436</text>
  <text x="440" y="262" text-anchor="middle" fill="#5a5f7a" font-size="10">tickets · clean corpus</text>
  <text x="440" y="271" text-anchor="middle" fill="#3d4166" font-size="9">872 API calls · ~1 hr · Free Tier</text>

  <!-- Defs -->
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="4" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#2a2d3e"/>
    </marker>
    <marker id="arrGreen" markerWidth="7" markerHeight="7" refX="4" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#4ade80"/>
    </marker>
  </defs>

  <!-- Footer -->
  <text x="350" y="412" text-anchor="middle" fill="#3d4166" font-size="10">DGPC · Cortex-QA · dgpconsult.com</text>
</svg>
