<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">

  <!-- Background -->
  <rect width="700" height="400" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="350" y="44" text-anchor="middle" fill="#f0f0f0" font-size="17" font-weight="700" letter-spacing="0.3">The Coverage Gap</text>
  <text x="350" y="66" text-anchor="middle" fill="#8b8fa8" font-size="12">10,000 tickets / month</text>

  <!-- Grid lines -->
  <line x1="130" y1="90" x2="620" y2="90" stroke="#1e2130" stroke-width="1"/>
  <line x1="130" y1="155" x2="620" y2="155" stroke="#1e2130" stroke-width="1"/>
  <line x1="130" y1="220" x2="620" y2="220" stroke="#1e2130" stroke-width="1"/>
  <line x1="130" y1="285" x2="620" y2="285" stroke="#1e2130" stroke-width="1"/>

  <!-- Y-axis labels -->
  <text x="118" y="93" text-anchor="end" fill="#5a5f7a" font-size="11">100%</text>
  <text x="118" y="158" text-anchor="end" fill="#5a5f7a" font-size="11">75%</text>
  <text x="118" y="223" text-anchor="end" fill="#5a5f7a" font-size="11">50%</text>
  <text x="118" y="288" text-anchor="end" fill="#5a5f7a" font-size="11">25%</text>

  <!-- Baseline -->
  <line x1="130" y1="350" x2="620" y2="350" stroke="#2a2d3e" stroke-width="1.5"/>

  <!-- BAR 1: Manual QA — 2% -->
  <!-- Full bar (ghost) -->
  <rect x="185" y="90" width="130" height="260" fill="#1e2130" rx="4"/>
  <!-- Actual bar -->
  <rect x="185" y="344.8" width="130" height="5.2" fill="#ef4444" rx="2"/>
  <!-- Glow effect -->
  <rect x="185" y="344.8" width="130" height="5.2" fill="url(#redGlow)" rx="2"/>

  <!-- BAR 2: Cortex-QA — 100% -->
  <!-- Full bar -->
  <rect x="385" y="90" width="130" height="260" fill="url(#greenGrad)" rx="4"/>
  <!-- Shimmer highlight -->
  <rect x="385" y="90" width="30" height="260" fill="url(#shimmer)" rx="4"/>

  <!-- Labels below bars -->
  <text x="250" y="375" text-anchor="middle" fill="#8b8fa8" font-size="13" font-weight="600">Manual QA</text>
  <text x="450" y="375" text-anchor="middle" fill="#8b8fa8" font-size="13" font-weight="600">Cortex-QA</text>

  <!-- Value labels ON bars -->
  <text x="250" y="337" text-anchor="middle" fill="#ef4444" font-size="19" font-weight="800">2%</text>
  <text x="250" y="356" text-anchor="middle" fill="#ef4444" font-size="10">200 tickets reviewed</text>

  <text x="450" y="115" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="800">100%</text>
  <text x="450" y="138" text-anchor="middle" fill="#a3e635" font-size="11" font-weight="600">10,000 tickets reviewed</text>

  <!-- Callout: blind spot -->
  <rect x="158" y="104" width="164" height="230" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="4 3" rx="4" opacity="0.5"/>
  <text x="240" y="224" text-anchor="middle" fill="#ef4444" font-size="10" opacity="0.8">Unreviewed</text>
  <text x="240" y="237" text-anchor="middle" fill="#ef4444" font-size="10" opacity="0.8">9,800 tickets</text>

  <!-- Delta annotation -->
  <line x1="322" y1="210" x2="378" y2="210" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="350" y="204" text-anchor="middle" fill="#6366f1" font-size="10" font-weight="700">50×</text>

  <!-- Defs -->
  <defs>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Footer caption -->
  <text x="350" y="396" text-anchor="middle" fill="#3d4166" font-size="10">DGPC · Cortex-QA · dgpconsult.com</text>
</svg>
